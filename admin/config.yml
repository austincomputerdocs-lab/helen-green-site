# This file tells the content manager what fields to show Helen.
# It edits content.json — the same file the website reads.
backend:
  name: git-gateway      # lets the CMS save changes back to your GitHub repo
  branch: main           # the branch your site deploys from
media_folder: "assets"   # where uploaded photos are stored in the project
public_folder: "assets"  # the path the website uses to find them
site_url: https://helen-green-art.netlify.app   # <-- change after you deploy
collections:
  - name: "site"
    label: "Helen Green — Website"
    files:
      - name: "content"
        label: "All site content"
        file: "content.json"
        # Each field below becomes a labelled box in the editor.
        fields:
          - { label: "Artist name",   name: "artistName",   widget: "string" }
          - { label: "Tagline",       name: "tagline",      widget: "string" }
          - { label: "Contact email", name: "contactEmail", widget: "string" }
          - { label: "Bio",           name: "bio",          widget: "text" }
          - { label: "Portrait photo", name: "portrait",    widget: "image", required: false }
          - label: "Mediums (the categories in the Artworks menu)"
            name: "mediums"
            widget: "list"   # a simple add/remove/reorder list of words
          - label: "Watercolors"
            name: "artworksWatercolors"
            widget: "list"
            label_singular: "Artwork"
            summary: "{{fields.title}}"
            collapsed: true
            minimize_collapsed: true
            fields: &artwork_fields
              - { label: "Title",       name: "title",       widget: "string" }
              - { label: "Year",        name: "year",        widget: "string", required: false }
              - { label: "Size",        name: "size",        widget: "string", required: false }
              - { label: "Sold",        name: "sold",        widget: "boolean", required: false, default: false }
              - { label: "Photo",       name: "image",       widget: "image",  required: false }
              - { label: "Description", name: "description", widget: "text",   required: false }
          - label: "Collage"
            name: "artworksCollage"
            widget: "list"
            label_singular: "Artwork"
            summary: "{{fields.title}}"
            collapsed: true
            minimize_collapsed: true
            fields: *artwork_fields
          - label: "Acrylics"
            name: "artworksAcrylics"
            widget: "list"
            label_singular: "Artwork"
            summary: "{{fields.title}}"
            collapsed: true
            minimize_collapsed: true
            fields: *artwork_fields
          - label: "Oils"
            name: "artworksOils"
            widget: "list"
            label_singular: "Artwork"
            summary: "{{fields.title}}"
            collapsed: true
            minimize_collapsed: true
            fields: *artwork_fields
          - label: "Others"
            name: "artworksOthers"
            widget: "list"
            label_singular: "Artwork"
            summary: "{{fields.title}}"
            collapsed: true
            minimize_collapsed: true
            fields: *artwork_fields
